<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Quest map">
  <defs>
    <style>
      .hotspot{cursor:pointer}
      .hotspot:hover{opacity:.85;transform:scale(1.03);transition:transform .12s}
      text{font-family:Fraunces, serif;pointer-events:none}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#1a1410"/>
  <g fill="none" stroke="#d4af37" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 300 C120 220, 180 220, 260 260 S420 320, 560 240" opacity=".6"/>
    <g class="hotspot" data-chapter="Setting Out" role="button" tabindex="0">
      <circle cx="64" cy="256" r="10" fill="#d4af37" stroke="#2a1f0f"/>
      <title>Setting Out — begin your journey</title>
    </g>
    <g class="hotspot" data-chapter="Reading the Land" role="button" tabindex="0">
      <circle cx="220" cy="280" r="10" fill="#d4af37" stroke="#2a1f0f"/>
      <title>Reading the Land — learn to observe</title>
    </g>
    <g class="hotspot" data-chapter="Old Lore and Your Pack" role="button" tabindex="0">
      <circle cx="380" cy="300" r="10" fill="#d4af37" stroke="#2a1f0f"/>
      <title>Old Lore and Your Pack — manage resources</title>
    </g>
    <g class="hotspot" data-chapter="The Road Goes On" role="button" tabindex="0">
      <circle cx="520" cy="240" r="10" fill="#d4af37" stroke="#2a1f0f"/>
      <title>The Road Goes On — continuing the quest</title>
    </g>
  </g>
  <text x="64" y="236" fill="#c9b89a" font-size="12">Setting Out</text>
  <text x="200" y="260" fill="#c9b89a" font-size="12">Reading the Land</text>
  <text x="360" y="280" fill="#c9b89a" font-size="12">Old Lore</text>
  <text x="500" y="220" fill="#c9b89a" font-size="12">The Road Goes On</text>
</svg>
